services:
  db:
    image: mysql:8.0
    container_name: virtualpet_db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5  

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: virtualpet_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    # ports:
    #   - "8000:8000"
    volumes:
      - .:/app
      - /app/.venv
    env_file:
      - .env

  nginx:
    image: nginx:alpine
    container_name: virtualpet_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend

volumes:
  mysql_data:
