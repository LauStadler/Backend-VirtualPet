server {
    2     listen 80;
    3     server_name _; # Esto hace que responda a cualquier nombre o IP
    4
    5     location / {
    6         proxy_pass http://backend:8000; # "backend" es el nombre del servicio en
      docker-compose
    7         proxy_set_header Host $host;
    8         proxy_set_header X-Real-IP $remote_addr;
    9         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
   10         proxy_set_header X-Forwarded-Proto $scheme;
   11     }
   12
   13     # Para los WebSockets del Backoffice
   14     location /backoffice/ws {
   15         proxy_pass http://backend:8000;
   16         proxy_http_version 1.1;
   17         proxy_set_header Upgrade $http_upgrade;
   18         proxy_set_header Connection "Upgrade";
   19         proxy_set_header Host $host;
   20     }
   21 }
